<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - Mr Doso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --input-bg: #0f172a;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --input-bg: #ffffff;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* Container de login */
        .login-wrapper {
            width: 100%;
            max-width: 420px;
        }

        .login-card {
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            padding: 40px 32px;
            border: 1px solid var(--border-color);
            position: relative;
            overflow: hidden;
        }

        .login-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        /* Cabeçalho */
        .login-header {
            text-align: center;
            margin-bottom: 36px;
        }

        .login-icon {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .login-icon i {
            font-size: 36px;
            color: white;
        }

        .login-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .login-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
        }

        /* Formulário */
        .login-form {
            margin-bottom: 24px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .form-label i {
            color: var(--primary);
            font-size: 1rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper input {
            width: 100%;
            padding: 16px 20px;
            padding-right: 50px;
            border: 2px solid var(--border-color);
            border-radius: 16px;
            background: var(--input-bg);
            color: var(--text-primary);
            font-family: 'Quicksand', sans-serif;
            font-size: 1rem;
            transition: all 0.3s;
            outline: none;
        }

        .input-wrapper input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(124, 58, 237, 0.2);
        }

        .input-wrapper input::placeholder {
            color: var(--text-muted);
        }

        .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 1.1rem;
            padding: 8px;
            transition: color 0.2s;
        }

        .toggle-password:hover {
            color: var(--primary);
        }

        /* Botão de login */
        .login-btn {
            width: 100%;
            padding: 16px 24px;
            border: none;
            border-radius: 16px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
            margin-top: 8px;
        }

        .login-btn i {
            font-size: 1.2rem;
        }

        .login-btn:active {
            transform: scale(0.97);
        }

        .login-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Mensagem de erro */
        .error-message {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.1), rgba(239, 68, 68, 0.05));
            border-left: 4px solid var(--danger);
            padding: 14px 16px;
            border-radius: 12px;
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--danger);
            font-size: 0.9rem;
            display: none;
        }

        .error-message.show {
            display: flex;
        }

        .error-message i {
            font-size: 1.1rem;
        }

        /* Links */
        .login-footer {
            text-align: center;
            margin-top: 24px;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: color 0.2s;
            padding: 8px 16px;
            border-radius: 30px;
            background: var(--bg-secondary);
        }

        .back-link:hover {
            color: var(--primary);
        }

        .back-link i {
            font-size: 0.9rem;
        }

        /* Tema toggle */
        .theme-toggle-wrapper {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 16px;
        }

        .theme-toggle-btn {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            color: var(--text-secondary);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1.2rem;
        }

        .theme-toggle-btn:hover {
            background: var(--bg-card);
            color: var(--primary);
        }

        /* Informação de segurança */
        .security-note {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .security-note i {
            color: var(--success);
        }

        /* Mobile */
        @media (max-width: 480px) {
            body {
                padding: 16px;
            }
            
            .login-card {
                padding: 32px 20px;
            }
            
            .login-icon {
                width: 70px;
                height: 70px;
            }
            
            .login-icon i {
                font-size: 30px;
            }
            
            .login-header h1 {
                font-size: 1.5rem;
            }
            
            .input-wrapper input {
                padding: 14px 16px;
                padding-right: 45px;
            }
            
            .login-btn {
                padding: 14px 20px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="login-wrapper">
        <div class="theme-toggle-wrapper">
            <button class="theme-toggle-btn" id="themeToggle">
                <i class="fas fa-sun"></i>
            </button>
        </div>
        
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fas fa-crown"></i>
                </div>
                <h1>Painel Admin</h1>
                <p>Área restrita - Acesso autorizado</p>
            </div>
            
            <form class="login-form" id="loginForm">
                <div class="form-group">
                    <div class="form-label">
                        <i class="fas fa-lock"></i>
                        <span>Senha de acesso</span>
                    </div>
                    <div class="input-wrapper">
                        <input type="password" id="password" placeholder="Digite sua senha" required autocomplete="current-password">
                        <button type="button" class="toggle-password" id="togglePassword">
                            <i class="fas fa-eye"></i>
                        </button>
                    </div>
                </div>
                
                <button type="submit" class="login-btn">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>Entrar no painel</span>
                </button>
            </form>
            
            <div class="error-message" id="errorMessage">
                <i class="fas fa-exclamation-circle"></i>
                <span id="errorText">Senha incorreta</span>
            </div>
            
            <div class="login-footer">
                <a href="/" class="back-link">
                    <i class="fas fa-arrow-left"></i>
                    <span>Voltar para o site</span>
                </a>
            </div>
        </div>
        
        <div class="security-note">
            <i class="fas fa-shield-alt"></i>
            <span>Conexão segura • Acesso monitorado</span>
        </div>
    </div>
    
    <script>
        // Configuração do tema
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
        }
        
        function updateThemeIcon(theme) {
            const icon = document.querySelector('#themeToggle i');
            if (icon) {
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
        
        // Mostrar/ocultar senha
        function initPasswordToggle() {
            const toggleBtn = document.getElementById('togglePassword');
            const passwordInput = document.getElementById('password');
            
            toggleBtn.addEventListener('click', () => {
                const type = passwordInput.type === 'password' ? 'text' : 'password';
                passwordInput.type = type;
                
                const icon = toggleBtn.querySelector('i');
                icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            });
        }
        
        // Mostrar erro
        function showError(message) {
            const errorEl = document.getElementById('errorMessage');
            const errorText = document.getElementById('errorText');
            errorText.textContent = message;
            errorEl.classList.add('show');
        }
        
        // Esconder erro
        function hideError() {
            const errorEl = document.getElementById('errorMessage');
            errorEl.classList.remove('show');
        }
        
        // Login
        async function handleLogin(e) {
            e.preventDefault();
            
            const password = document.getElementById('password').value;
            const loginBtn = document.querySelector('.login-btn');
            const btnText = loginBtn.querySelector('span');
            const btnIcon = loginBtn.querySelector('i');
            
            if (!password) {
                showError('Digite a senha de acesso');
                return;
            }
            
            hideError();
            
            // Estado de loading
            loginBtn.disabled = true;
            btnIcon.className = 'fas fa-spinner fa-pulse';
            btnText.textContent = 'Autenticando...';
            
            try {
                const response = await fetch('/admin/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Sucesso - redirecionar
                    btnIcon.className = 'fas fa-check';
                    btnText.textContent = 'Acesso liberado!';
                    
                    setTimeout(() => {
                        window.location.href = '/admin-panel';
                    }, 500);
                } else {
                    // Erro
                    loginBtn.disabled = false;
                    btnIcon.className = 'fas fa-sign-in-alt';
                    btnText.textContent = 'Entrar no painel';
                    showError(data.error || 'Senha incorreta');
                    
                    // Limpar campo
                    document.getElementById('password').value = '';
                    document.getElementById('password').focus();
                }
            } catch (error) {
                console.error('Erro:', error);
                loginBtn.disabled = false;
                btnIcon.className = 'fas fa-sign-in-alt';
                btnText.textContent = 'Entrar no painel';
                showError('Erro de conexão. Tente novamente.');
            }
        }
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            initPasswordToggle();
            
            // Toggle tema
            document.getElementById('themeToggle').addEventListener('click', () => {
                const current = document.body.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
            
            // Form de login
            document.getElementById('loginForm').addEventListener('submit', handleLogin);
            
            // Foco no campo de senha
            document.getElementById('password').focus();
            
            // Esconder erro ao digitar
            document.getElementById('password').addEventListener('input', hideError);
        });
        
        // Atalho: Enter para submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && document.getElementById('password') === document.activeElement) {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
