<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Mr Doso - Hub de Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --header-bg: #0f172a;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #ffffff;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --header-bg: #7c3aed;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
        }

        /* Header */
        .header {
            background: var(--header-bg);
            padding: 12px 16px;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 8px;
            color: white;
            text-decoration: none;
            font-weight: 700;
            font-size: 1.2rem;
        }

        .logo i {
            font-size: 1.4rem;
            color: var(--accent);
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .search-wrapper {
            flex: 1;
            max-width: 300px;
        }

        .search-bar {
            width: 100%;
            padding: 10px 16px;
            border-radius: 30px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-size: 0.9rem;
            backdrop-filter: blur(10px);
        }

        .search-bar::placeholder {
            color: rgba(255, 255, 255, 0.6);
        }

        .search-bar:focus {
            outline: 2px solid var(--accent);
            background: rgba(255, 255, 255, 0.15);
        }

        .icon-btn {
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            font-size: 1.1rem;
            backdrop-filter: blur(10px);
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.05);
        }

        /* Categorias */
        .categories {
            padding: 16px;
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border-color);
        }

        .categories::-webkit-scrollbar {
            display: none;
        }

        .category-btn {
            padding: 8px 16px;
            border-radius: 30px;
            border: 1px solid var(--border-color);
            background: var(--bg-card);
            color: var(--text-secondary);
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .category-btn i {
            font-size: 0.9rem;
        }

        .category-btn.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            border-color: transparent;
        }

        .category-btn:active {
            transform: scale(0.95);
        }

        /* Grid de Itens - Mobile First: 3 colunas */
        .items-grid {
            padding: 12px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            flex: 1;
        }

        .item-card {
            background: var(--bg-card);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: transform 0.2s, box-shadow 0.2s;
            cursor: pointer;
            border: 1px solid var(--border-color);
        }

        .item-card:active {
            transform: scale(0.97);
        }

        .item-image {
            width: 100%;
            aspect-ratio: 2/3;
            object-fit: cover;
            background: linear-gradient(135deg, var(--primary-light), var(--secondary));
            display: block;
        }

        .item-info {
            padding: 10px 8px;
        }

        .item-title {
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 4px;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            min-height: 2.2em;
        }

        .item-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 8px;
        }

        .item-category {
            font-size: 0.65rem;
            padding: 2px 6px;
            background: var(--primary);
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .item-downloads {
            display: flex;
            align-items: center;
            gap: 3px;
            color: var(--text-muted);
            font-size: 0.7rem;
        }

        .item-downloads i {
            font-size: 0.65rem;
        }

        .download-btn {
            width: 100%;
            padding: 8px 4px;
            border: none;
            border-radius: 20px;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            color: white;
            font-family: 'Quicksand', sans-serif;
            font-weight: 600;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 4px;
        }

        .download-btn i {
            font-size: 0.7rem;
        }

        .download-btn:active {
            transform: scale(0.95);
            opacity: 0.9;
        }

        /* Estados */
        .loading, .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .loading i, .empty-state i {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .empty-state h3 {
            margin-bottom: 8px;
            color: var(--text-primary);
        }

        .empty-state p {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        /* Footer */
        footer {
            text-align: center;
            padding: 20px;
            color: var(--text-muted);
            font-size: 0.8rem;
            border-top: 1px solid var(--border-color);
            margin-top: auto;
        }

        /* Tablet e Desktop */
        @media (min-width: 640px) {
            .items-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                padding: 20px;
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .item-title {
                font-size: 0.95rem;
            }
            
            .download-btn {
                font-size: 0.85rem;
                padding: 10px;
            }
        }

        @media (min-width: 1024px) {
            .items-grid {
                grid-template-columns: repeat(5, 1fr);
            }
            
            .header-content {
                max-width: 1200px;
                margin: 0 auto;
            }
            
            .categories {
                max-width: 1200px;
                margin: 0 auto;
                padding: 16px 20px;
            }
        }

        /* Ajustes para telas muito pequenas */
        @media (max-width: 360px) {
            .items-grid {
                gap: 6px;
                padding: 8px;
            }
            
            .item-title {
                font-size: 0.75rem;
            }
            
            .download-btn {
                font-size: 0.65rem;
                padding: 6px 2px;
            }
            
            .logo span {
                display: none;
            }
        }
    </style>
</head>
<body data-theme="dark">
    <header class="header">
        <div class="header-content">
            <a href="/" class="logo">
                <i class="fas fa-bolt"></i>
                <span>Mr Doso</span>
            </a>
            <div class="search-wrapper">
                <input type="text" class="search-bar" placeholder="Buscar..." id="searchInput">
            </div>
            <div class="header-actions">
                <button class="icon-btn" id="themeToggle">
                    <i class="fas fa-sun"></i>
                </button>
                <a href="/admin-login" class="icon-btn">
                    <i class="fas fa-crown"></i>
                </a>
            </div>
        </div>
    </header>
    
    <div class="categories">
        <button class="category-btn active" data-category="todos">
            <i class="fas fa-grid-2"></i> Todos
        </button>
        <button class="category-btn" data-category="filmes">
            <i class="fas fa-film"></i> Filmes
        </button>
        <button class="category-btn" data-category="series">
            <i class="fas fa-tv"></i> Séries
        </button>
        <button class="category-btn" data-category="jogos">
            <i class="fas fa-gamepad"></i> Jogos
        </button>
        <button class="category-btn" data-category="cursos">
            <i class="fas fa-graduation-cap"></i> Cursos
        </button>
        <button class="category-btn" data-category="apps">
            <i class="fas fa-mobile-screen"></i> Apps
        </button>
    </div>
    
    <div class="items-grid" id="itemsGrid">
        <div class="loading">
            <i class="fas fa-spinner fa-pulse"></i>
            <p>Carregando...</p>
        </div>
    </div>
    
    <footer>
        <p>Mr Doso Hub - Sua biblioteca de conteúdo</p>
    </footer>
    
    <!-- Monetag -->
    <script>
        (function() {
            if (!window.monetagLoaded) {
                window.monetagLoaded = true;
                const script = document.createElement('script');
                script.src = 'https://quge5.com/88/tag.min.js';
                script.setAttribute('data-zone', '203209');
                script.async = true;
                document.head.appendChild(script);
            }
        })();
    </script>
    
    <script>
        // Configuração do tema
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', theme);
            updateThemeIcon(theme);
        }
        
        function updateThemeIcon(theme) {
            const icon = document.querySelector('#themeToggle i');
            if (icon) {
                icon.className = theme === 'dark' ? 'fas fa-sun' : 'fas fa-moon';
            }
        }
        
        // Formatação de números
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'k';
            return num.toString();
        }
        
        // Criação do card
        function createItemCard(item) {
            const div = document.createElement('div');
            div.className = 'item-card';
            div.onclick = () => window.location.href = '/item/' + item.id;
            
            const imageUrl = item.imagem || 'https://via.placeholder.com/200x300/7c3aed/ffffff?text=' + encodeURIComponent(item.titulo.substring(0, 10));
            
            div.innerHTML = `
                <img src="${imageUrl}" alt="${item.titulo}" class="item-image" loading="lazy"
                     onerror="this.src='https://via.placeholder.com/200x300/7c3aed/ffffff?text=...'">
                <div class="item-info">
                    <h3 class="item-title">${item.titulo}</h3>
                    <div class="item-meta">
                        <span class="item-category">${item.categoria || 'Geral'}</span>
                        <span class="item-downloads">
                            <i class="fas fa-download"></i>
                            ${formatNumber(item.downloads || 0)}
                        </span>
                    </div>
                    <button class="download-btn" onclick="event.stopPropagation(); startDownload('${item.id}')">
                        <i class="fas fa-download"></i>
                        Baixar
                    </button>
                </div>
            `;
            
            return div;
        }
        
        // Iniciar download
        async function startDownload(itemId) {
            try {
                const response = await fetch('/api/start-download/' + itemId, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }
                });
                
                const data = await response.json();
                
                if (data.redirect) {
                    window.location.href = data.redirect;
                } else {
                    alert('Erro ao iniciar download');
                }
            } catch (error) {
                alert('Erro de conexão');
            }
        }
        
        // Estado
        let currentCategory = 'todos';
        let currentPage = 1;
        let isLoading = false;
        let hasMore = true;
        
        const grid = document.getElementById('itemsGrid');
        const searchInput = document.getElementById('searchInput');
        
        // Carregar itens
        async function loadItems(search = '') {
            if (isLoading) return;
            isLoading = true;
            
            try {
                const response = await fetch('/api/items?categoria=' + currentCategory + '&page=' + currentPage);
                const data = await response.json();
                
                if (currentPage === 1) {
                    grid.innerHTML = '';
                }
                
                let items = data.items;
                
                if (search) {
                    items = items.filter(item => 
                        item.titulo.toLowerCase().includes(search.toLowerCase())
                    );
                }
                
                if (items.length === 0 && currentPage === 1) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-box-open"></i>
                            <h3>Nenhum item</h3>
                            <p>Tente outra categoria</p>
                        </div>
                    `;
                    return;
                }
                
                items.forEach(item => {
                    grid.appendChild(createItemCard(item));
                });
                
                hasMore = data.hasMore;
                currentPage++;
            } catch (error) {
                console.error('Erro:', error);
                if (currentPage === 1) {
                    grid.innerHTML = `
                        <div class="empty-state">
                            <i class="fas fa-exclamation-triangle"></i>
                            <h3>Erro</h3>
                            <p>Tente novamente</p>
                        </div>
                    `;
                }
            } finally {
                isLoading = false;
            }
        }
        
        // Inicialização
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            loadItems();
            
            // Toggle tema
            document.getElementById('themeToggle').addEventListener('click', () => {
                const current = document.body.getAttribute('data-theme');
                const newTheme = current === 'dark' ? 'light' : 'dark';
                document.body.setAttribute('data-theme', newTheme);
                localStorage.setItem('theme', newTheme);
                updateThemeIcon(newTheme);
            });
            
            // Categorias
            document.querySelectorAll('.category-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.category-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = btn.dataset.category;
                    currentPage = 1;
                    grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p>Carregando...</p></div>';
                    loadItems(searchInput.value);
                });
            });
            
            // Infinite scroll
            let scrollTimeout;
            window.addEventListener('scroll', () => {
                clearTimeout(scrollTimeout);
                scrollTimeout = setTimeout(() => {
                    const scrollBottom = window.innerHeight + window.scrollY;
                    if (scrollBottom >= document.body.offsetHeight - 300) {
                        if (!isLoading && hasMore) {
                            loadItems(searchInput.value);
                        }
                    }
                }, 100);
            });
            
            // Busca
            let searchTimeout;
            searchInput.addEventListener('input', (e) => {
                clearTimeout(searchTimeout);
                searchTimeout = setTimeout(() => {
                    currentPage = 1;
                    grid.innerHTML = '<div class="loading"><i class="fas fa-spinner fa-pulse"></i><p>Carregando...</p></div>';
                    loadItems(e.target.value);
                }, 500);
            });
        });
    </script>
</body>
</html>
