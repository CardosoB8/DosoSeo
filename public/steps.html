<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processando - Mr Doso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body data-theme="dark">
    <div class="step-container">
        <div class="progress-steps" id="progressSteps"></div>
        <div class="progress-bar-container">
            <div class="progress-bar-fill" id="progressFill"></div>
        </div>
        
        <h1 id="stepTitle">
            <i class="fas fa-shield-alt"></i>
            <span>Verificação Inicial</span>
        </h1>
        <p class="subtitle" id="stepSubtitle">Preparando seu link seguro...</p>
        
        <div class="timer-section">
            <div id="countdown">20</div>
            <div class="countdown-label">SEGUNDOS RESTANTES</div>
        </div>
        
        <div class="ad-container" id="adsterraContainer" style="display: none;">
            <div id="container-57af132f9a89824d027d70445ba09a9a"></div>
        </div>
        
        <div class="info-box" id="infoBox">
            <i class="fas fa-shield-alt"></i>
            <div>
                <strong id="infoTitle">Aguarde um momento</strong>
                <p id="infoText">O botão será liberado em breve</p>
            </div>
        </div>
        
        <button id="mainActionBtn" class="action-button" disabled>
            <i class="fas fa-hourglass-half"></i>
            <span>Aguarde...</span>
        </button>
        
        <a class="secondary-link" id="bonusOffer" style="display: none;">
            <i class="fas fa-gift"></i> Oferta bônus disponível
        </a>
    </div>
    
    <footer>
        <p>© 2026 Mr Doso Web</p>
    </footer>
    
    <!-- Monetag -->
    <script>
        (function() {
            if (!window.monetagLoaded) {
                window.monetagLoaded = true;
                const script = document.createElement('script');
                script.src = 'https://quge5.com/88/tag.min.js';
                script.setAttribute('data-zone', '203209');
                script.async = true;
                document.head.appendChild(script);
            }
        })();
    </script>
    
    <script src="steps.js"></script>
</body>
</html>
