<!DOCTYPE html>
<html lang="pt-BR">
<head>
<script src="https://quge5.com/88/tag.min.js" data-zone="203209" async data-cfasync="false"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Processando - Mr Doso</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #7c3aed;
            --primary-light: #a78bfa;
            --secondary: #ec4899;
            --accent: #06b6d4;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        [data-theme="dark"] {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --text-primary: #f1f5f9;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --border-color: #1e293b;
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.3);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.4);
        }

        [data-theme="light"] {
            --bg-primary: #f8fafc;
            --bg-secondary: #f1f5f9;
            --bg-card: #ffffff;
            --text-primary: #1e293b;
            --text-secondary: #475569;
            --text-muted: #94a3b8;
            --border-color: #e2e8f0;
            --shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
            --shadow-lg: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Quicksand', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            transition: background 0.3s, color 0.3s;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .step-container {
            background: var(--bg-card);
            border-radius: 32px;
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 480px;
            padding: 32px 24px;
            position: relative;
            overflow: hidden;
            border: 1px solid var(--border-color);
        }

        .step-container::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary), var(--accent));
        }

        .progress-steps {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            position: relative;
        }

        .step-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            flex: 1;
            position: relative;
            z-index: 2;
        }

        .step-dot {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg-secondary);
            border: 2px solid var(--border-color);
            color: var(--text-muted);
            font-weight: 700;
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }

        .step-dot.active {
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            border-color: transparent;
            color: white;
            box-shadow: 0 0 20px rgba(124, 58, 237, 0.4);
        }

        .step-dot.completed {
            background: var(--success);
            border-color: transparent;
            color: white;
        }

        .step-dot.completed i { font-size: 1.2rem; }

        .step-label {
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .step-label.active { color: var(--primary); }

        .progress-bar-wrapper { margin: 24px 0; }

        .progress-bar-container {
            width: 100%;
            height: 8px;
            background: var(--bg-secondary);
            border-radius: 20px;
            overflow: hidden;
        }

        .progress-bar-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--accent));
            border-radius: 20px;
            transition: width 0.5s ease;
            width: 0%;
        }

        .progress-text {
            text-align: right;
            font-size: 0.8rem;
            color: var(--text-muted);
            margin-top: 6px;
        }

        .step-header { text-align: center; margin-bottom: 24px; }

        .step-header h1 {
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            color: var(--text-primary);
        }

        .step-header h1 i { color: var(--primary); font-size: 1.6rem; }

        .step-header .subtitle { color: var(--text-secondary); font-size: 0.9rem; }

        .timer-section {
            background: linear-gradient(135deg, var(--bg-secondary), var(--bg-card));
            border-radius: 24px;
            padding: 28px 20px;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .countdown-number {
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 8px;
            font-variant-numeric: tabular-nums;
        }

        .countdown-label {
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 3px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        /* Container do anúncio - visível/oculto via JS */
        .ad-wrapper {
            margin: 20px 0;
            min-height: 250px;
            display: flex;
            justify-content: center;
            align-items: center;
            background: var(--bg-secondary);
            border-radius: 16px;
            border: 1px solid var(--border-color);
            overflow: hidden;
            transition: opacity 0.3s;
        }

        .ad-wrapper.hidden { display: none; }

        .info-box {
            background: linear-gradient(135deg, rgba(124, 58, 237, 0.1), rgba(124, 58, 237, 0.05));
            border-left: 4px solid var(--primary);
            padding: 16px;
            border-radius: 12px;
            margin: 20px 0;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }

        .info-box.success {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(16, 185, 129, 0.05));
            border-left-color: var(--success);
        }

        .info-box i { font-size: 1.3rem; color: var(--primary); }
        .info-box.success i { color: var(--success); }
        .info-box-content { flex: 1; }

        .info-box-content strong {
            display: block;
            color: var(--text-primary);
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .info-box-content p {
            color: var(--text-secondary);
            font-size: 0.85rem;
            line-height: 1.4;
        }

        .action-button {
            width: 100%;
            padding: 18px 24px;
            border: none;
            border-radius: 60px;
            font-family: 'Quicksand', sans-serif;
            font-weight: 700;
            font-size: 1.1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            color: white;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(124, 58, 237, 0.3);
        }

        .action-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .action-button.final {
            background: linear-gradient(135deg, var(--success), #059669);
            box-shadow: 0 10px 30px rgba(16, 185, 129, 0.3);
        }

        .action-button:not(:disabled):active { transform: scale(0.97); }
        .action-button i { font-size: 1.2rem; }

        .secondary-link {
            display: inline-block;
            margin-top: 16px;
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: color 0.2s;
            text-align: center;
            width: 100%;
        }

        .secondary-link i { margin-right: 6px; }
        .secondary-link:hover { color: var(--primary-light); }

        .footer-note {
            text-align: center;
            margin-top: 24px;
            color: var(--text-muted);
            font-size: 0.8rem;
        }

        .error-banner {
            background: rgba(239, 68, 68, 0.1);
            border: 1px solid var(--danger);
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            color: var(--danger);
            display: none;
            text-align: center;
        }

        .error-banner.show { display: block; }

        @media (max-width: 480px) {
            body { padding: 12px; }
            .step-container { padding: 24px 16px; }
            .step-dot { width: 40px; height: 40px; font-size: 1rem; }
            .step-label { font-size: 0.6rem; }
            .step-header h1 { font-size: 1.3rem; }
            .countdown-number { font-size: 3rem; }
            .action-button { padding: 16px 20px; font-size: 1rem; }
            .info-box { padding: 12px; }
        }

        @media (max-width: 360px) {
            .step-dot { width: 35px; height: 35px; }
            .step-label { display: none; }
        }
    </style>
</head>
<body data-theme="dark">
    <div class="step-container">
        <div class="error-banner" id="errorBanner">
            <i class="fas fa-exclamation-triangle"></i>
            <span id="errorText">Erro de conexão</span>
        </div>
        
        <div class="progress-steps" id="progressSteps"></div>
        
        <div class="progress-bar-wrapper">
            <div class="progress-bar-container">
                <div class="progress-bar-fill" id="progressFill"></div>
            </div>
            <div class="progress-text" id="progressText">Etapa 1 de 3</div>
        </div>
        
        <div class="step-header">
            <h1 id="stepTitle">
                <i class="fas fa-shield-alt"></i>
                <span>Verificação Inicial</span>
            </h1>
            <p class="subtitle" id="stepSubtitle">Preparando seu link seguro...</p>
        </div>
        
        <div class="timer-section">
            <div class="countdown-number" id="countdown">20</div>
            <div class="countdown-label">Segundos restantes</div>
        </div>
        
        <!-- AD - VISÍVEL APENAS NA ETAPA 1 E 3 -->
        <div class="ad-wrapper" id="adWrapper">
            <script async="async" data-cfasync="false" src="https://eminentpercentvandalism.com/57af132f9a89824d027d70445ba09a9a/invoke.js"></script>
            <div id="container-57af132f9a89824d027d70445ba09a9a"></div>
        </div>
        
        <div class="info-box" id="infoBox">
            <i class="fas fa-shield-alt"></i>
            <div class="info-box-content">
                <strong id="infoTitle">Aguarde um momento</strong>
                <p id="infoText">O botão será liberado em breve</p>
            </div>
        </div>
       
        <button id="mainActionBtn" class="action-button" disabled>
            <i class="fas fa-hourglass-half"></i>
            <span>Aguarde...</span>
        </button>
        
        <a class="secondary-link" id="bonusOffer" style="display: none;">
            <i class="fas fa-gift"></i> Oferta bônus disponível
        </a>
    </div>
    
    <div class="footer-note">
        <i class="fas fa-lock"></i> Conexão segura
    </div>
    
    <script>
        // ===================== CONFIGURAÇÃO =====================
        let config = {
            etapa: 1,
            totalSteps: 3,
            timer: 20,
            cpaLink: null,
            temAdsterra: false,
            temCPA: false,
            isFinalStep: false,
            cpaJaAberto: false,
            icone: 'fa-shield-alt',
            titulo: 'Verificação Inicial',
            subtitulo: 'Preparando seu link seguro...',
            botaoTexto: 'Continuar'
        };
        
        let timeLeft = 20;
        let cpaOpened = false;
        let isProcessing = false;
        let sessionId = '';
        let timerInterval = null;
        let timerStartTime = null;  // NOVO: quando o timer começou
        
        // ===================== FUNÇÕES AUXILIARES =====================
        function getCookie(name) {
            const value = '; ' + document.cookie;
            const parts = value.split('; ' + name + '=');
            if (parts.length === 2) return parts.pop().split(';').shift();
            return null;
        }
        
        function getSessionId() {
            const urlParams = new URLSearchParams(window.location.search);
            const urlSid = urlParams.get('sid');
            if (urlSid) { saveSessionId(urlSid); return urlSid; }
            
            const storageSid = localStorage.getItem('lastSessionId');
            if (storageSid) return storageSid;
            
            const sessionSid = sessionStorage.getItem('currentSessionId');
            if (sessionSid) return sessionSid;
            
            const cookieSid = getCookie('dsessId');
            if (cookieSid) return cookieSid;
            
            return null;
        }
        
        function saveSessionId(sid) {
            if (sid) {
                sessionId = sid;
                document.cookie = `dsessId=${sid}; path=/; max-age=${72*60*60}`;
                localStorage.setItem('lastSessionId', sid);
                sessionStorage.setItem('currentSessionId', sid);
            }
        }
        
        function showError(message) {
            const banner = document.getElementById('errorBanner');
            const text = document.getElementById('errorText');
            text.textContent = message;
            banner.classList.add('show');
            setTimeout(() => banner.classList.remove('show'), 5000);
        }
        
        function initTheme() {
            const theme = localStorage.getItem('theme') || 'dark';
            document.body.setAttribute('data-theme', theme);
        }
        
        // ===================== ATUALIZAR UI =====================
        function updateUI() {
            // Etapas
            const progressSteps = document.getElementById('progressSteps');
            progressSteps.innerHTML = '';
            
            for (let i = 1; i <= config.totalSteps; i++) {
                const stepItem = document.createElement('div');
                stepItem.className = 'step-item';
                
                let dotClass = 'step-dot';
                let dotContent = i;
                
                if (i < config.etapa) {
                    dotClass += ' completed';
                    dotContent = '<i class="fas fa-check"></i>';
                } else if (i === config.etapa) {
                    dotClass += ' active';
                }
                
                stepItem.innerHTML = `
                    <div class="${dotClass}">${dotContent}</div>
                    <span class="step-label ${i === config.etapa ? 'active' : ''}">Etapa ${i}</span>
                `;
                progressSteps.appendChild(stepItem);
            }
            
            // Barra de progresso
            document.getElementById('progressFill').style.width = (config.etapa / config.totalSteps) * 100 + '%';
            document.getElementById('progressText').textContent = 'Etapa ' + config.etapa + ' de ' + config.totalSteps;
            
            // Título
            document.getElementById('stepTitle').innerHTML = `<i class="fas ${config.icone}"></i><span>${config.titulo}</span>`;
            document.getElementById('stepSubtitle').textContent = config.subtitulo;
            
            // Info box
            const infoBox = document.getElementById('infoBox');
            const infoIcon = infoBox.querySelector('i');
            const infoTitle = document.getElementById('infoTitle');
            const infoText = document.getElementById('infoText');
            
            if (config.isFinalStep) {
                infoBox.className = 'info-box success';
                infoIcon.className = 'fas fa-check-circle';
                infoTitle.textContent = 'Pronto!';
                infoText.textContent = 'Seu conteúdo está disponível. Clique no botão para acessar.';
            } else if (config.temCPA) {
                infoBox.className = 'info-box';
                infoIcon.className = 'fas fa-shield-alt';
                infoTitle.textContent = 'Verificação adicional';
                infoText.textContent = 'Clique no botão para continuar';
            } else {
                infoBox.className = 'info-box';
                infoIcon.className = 'fas fa-shield-alt';
                infoTitle.textContent = 'Aguarde um momento';
                infoText.textContent = 'O botão será liberado em breve';
            }
            
            // AD - Visível apenas nas etapas 1 e 3
            const adWrapper = document.getElementById('adWrapper');
            if (config.etapa === 1 || config.etapa === 3) {
                adWrapper.classList.remove('hidden');
            } else {
                adWrapper.classList.add('hidden');
            }
            
            // Oferta bônus
            const bonusOffer = document.getElementById('bonusOffer');
            if (config.isFinalStep && config.cpaLink) {
                bonusOffer.style.display = 'inline-block';
            } else {
                bonusOffer.style.display = 'none';
            }
            
            document.getElementById('countdown').textContent = timeLeft;
        }
        
        // ===================== HABILITAR BOTÃO =====================
        function enableButton() {
            const mainBtn = document.getElementById('mainActionBtn');
            mainBtn.disabled = false;
            
            if (config.isFinalStep) {
                mainBtn.innerHTML = '<i class="fas fa-external-link-alt"></i><span>' + config.botaoTexto + '</span>';
                mainBtn.className = 'action-button final';
            } else {
                mainBtn.innerHTML = '<i class="fas fa-arrow-right"></i><span>' + config.botaoTexto + '</span>';
                mainBtn.className = 'action-button';
            }
        }
        
        // ===================== TIMER (COM CONTROLE DE TEMPO REAL) =====================
        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            const countdownEl = document.getElementById('countdown');
            
            // Se o timer já acabou
            if (timeLeft <= 0) {
                countdownEl.textContent = '0';
                enableButton();
                return;
            }
            
            // Marcar quando o timer começou (se ainda não foi marcado)
            if (!timerStartTime) {
                timerStartTime = Date.now() - ((config.timer - timeLeft) * 1000);
            }
            
            countdownEl.textContent = timeLeft;
            
            timerInterval = setInterval(() => {
                // Calcular tempo real decorrido
                const agora = Date.now();
                const decorrido = Math.floor((agora - timerStartTime) / 1000);
                timeLeft = Math.max(0, config.timer - decorrido);
                
                countdownEl.textContent = timeLeft;
                
                if (timeLeft <= 0) {
                    clearInterval(timerInterval);
                    timerInterval = null;
                    timerStartTime = null;
                    enableButton();
                }
            }, 500); // Atualiza a cada 500ms para precisão
        }
        
        // ===================== CARREGAR CONFIGURAÇÃO =====================
        async function loadStepConfig() {
            try {
                const sid = getSessionId();
                if (!sid) {
                    showError('Sessão não encontrada. Redirecionando...');
                    setTimeout(() => window.location.href = '/', 2000);
                    return;
                }
                
                saveSessionId(sid);
                
                const response = await fetch('/api/step-config', {
                    headers: { 
                        'x-session-id': sessionId,
                        'Cache-Control': 'no-cache'
                    }
                });
                
                if (!response.ok) {
                    if (response.status === 403) {
                        showError('Sessão expirada. Redirecionando...');
                        setTimeout(() => window.location.href = '/', 2000);
                        return;
                    }
                    throw new Error('Erro ao carregar');
                }
                
                const data = await response.json();
                
                // Verificar se a etapa mudou (ex: servidor avançou)
                const etapaAnterior = config.etapa;
                config = data;
                
                // Se a etapa mudou, resetar o timer
                if (config.etapa !== etapaAnterior) {
                    timeLeft = config.timer;
                    timerStartTime = null;
                    cpaOpened = config.cpaJaAberto || false;
                } else {
                    // Mesma etapa - manter o tempo restante se já estava rodando
                    if (timerStartTime && !config.cpaJaAberto) {
                        const agora = Date.now();
                        const decorrido = Math.floor((agora - timerStartTime) / 1000);
                        timeLeft = Math.max(0, config.timer - decorrido);
                    } else {
                        timeLeft = config.timer;
                        timerStartTime = null;
                    }
                    cpaOpened = config.cpaJaAberto || false;
                }
                
                if (data.sessionId) {
                    saveSessionId(data.sessionId);
                }
                
                updateUI();
                startTimer();
            } catch (error) {
                console.error('Erro:', error);
                showError('Erro ao carregar. Tentando novamente...');
                setTimeout(loadStepConfig, 2000);
            }
        }
        
        // ===================== PRÓXIMA ETAPA =====================
        async function nextStep() {
            if (isProcessing) return;
            if (timeLeft > 0 && config.timer > 0) {
                showError('Aguarde ' + timeLeft + ' segundos.');
                return;
            }
            
            isProcessing = true;
            const mainBtn = document.getElementById('mainActionBtn');
            
            // ETAPA FINAL
            if (config.isFinalStep) {
                mainBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i><span>Redirecionando...</span>';
                
                try {
                    const response = await fetch('/api/next-step', {
                        method: 'POST',
                        headers: { 
                            'Content-Type': 'application/json',
                            'x-session-id': sessionId
                        },
                        body: JSON.stringify({ 
                            currentStep: config.etapa, 
                            sessionId,
                            cpaOpened,
                            timerIniciadoEm: timerStartTime
                        })
                    });
                    
                    const data = await response.json();
                    if (data.sessionId) saveSessionId(data.sessionId);
                    
                    if (data.redirect) {
                        window.location.href = data.redirect;
                    } else {
                        throw new Error('Sem redirect');
                    }
                } catch (error) {
                    showError('Erro de conexão');
                    isProcessing = false;
                    enableButton();
                }
                return;
            }
            
            // CPA - Abrir link
            if (config.temCPA && !cpaOpened && config.cpaLink) {
                mainBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i><span>Abrindo...</span>';
                
                saveSessionId(sessionId);
                window.open(config.cpaLink, '_blank');
                cpaOpened = true;
                config.cpaJaAberto = true;
                
                // NÃO resetar o timer
                enableButton();
                isProcessing = false;
                return;
            }
            
            // AVANÇAR ETAPA
            mainBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i><span>Processando...</span>';
            mainBtn.disabled = true;
            
            try {
                const response = await fetch('/api/next-step', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'x-session-id': sessionId
                    },
                    body: JSON.stringify({ 
                        currentStep: config.etapa, 
                        sessionId,
                        cpaOpened,
                        timerIniciadoEm: timerStartTime
                    })
                });
                
                const data = await response.json();
                if (data.sessionId) saveSessionId(data.sessionId);
                
                if (data.redirect) {
                    let redirectUrl = data.redirect;
                    if (redirectUrl.startsWith('/page') && sessionId) {
                        redirectUrl += `?sid=${sessionId}`;
                    }
                    // Resetar timer ao mudar de etapa
                    timerStartTime = null;
                    window.location.href = redirectUrl;
                } else {
                    showError(data.error || 'Erro ao avançar');
                    mainBtn.disabled = false;
                    enableButton();
                }
            } catch (e) {
                console.error('Erro:', e);
                showError('Erro de conexão');
                mainBtn.disabled = false;
                enableButton();
            } finally {
                isProcessing = false;
            }
        }
        
        // ===================== VOLTOU DO CPA - NÃO RESETAR TIMER =====================
        document.addEventListener('visibilitychange', () => {
            if (!document.hidden && cpaOpened && !isProcessing) {
                // NÃO chama loadStepConfig() - apenas verifica se o timer deve continuar
                console.log('🔄 Voltou à aba. Timer continua de ' + timeLeft + 's');
                
                // Se o timer já estava zerado, habilitar botão
                if (timeLeft <= 0) {
                    enableButton();
                }
            }
        });
        
        // ===================== INICIALIZAÇÃO =====================
        document.addEventListener('DOMContentLoaded', () => {
            initTheme();
            
            const urlParams = new URLSearchParams(window.location.search);
            const urlSid = urlParams.get('sid');
            if (urlSid) {
                saveSessionId(urlSid);
                window.history.replaceState({}, document.title, window.location.pathname);
            }
            
            loadStepConfig();
            
            document.getElementById('mainActionBtn').addEventListener('click', nextStep);
            
            document.getElementById('bonusOffer').addEventListener('click', () => {
                if (config.cpaLink) {
                    window.open(config.cpaLink, '_blank');
                }
            });
        });
        
        window.addEventListener('beforeunload', () => {
            if (timerInterval) clearInterval(timerInterval);
            if (sessionId) saveSessionId(sessionId);
        });
    </script>
</body>
</html>
